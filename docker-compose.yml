services:
  postgres:
    image: postgres:16
    container_name: teamgeist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: teamgeist
      POSTGRES_USER: teamgeist
      POSTGRES_PASSWORD: teamgeist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamgeist -d teamgeist"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: teamgeist-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
    driver: local
